<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Changelog – RateLimit API</title>
  <meta name="description" content="Alle Änderungen, Verbesserungen und neuen Features der RateLimit API im Überblick.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" type="image/png" href="/favicon.png">
  <link rel="canonical" href="https://ratelimit-api.pages.dev/changelog" />
  <style>
    :root {
      --primary:   #3b82f6;
      --purple:    #8b5cf6;
      --green:     #10b981;
      --red:       #ef4444;
      --yellow:    #f59e0b;
      --pink:      #ec4899;
      --bg:        #0f172a;
      --surface:   #1e293b;
      --surface2:  #334155;
      --border:    rgba(255,255,255,0.08);
      --text1:     #f1f5f9;
      --text2:     #cbd5e1;
      --text3:     #64748b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text1);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ─── Nav ─── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
    }
    .nav-inner {
      max-width: 900px;
      margin: 0 auto;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      color: var(--text1);
      font-weight: 700;
      font-size: 1.1rem;
    }
    .nav-logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .nav-spacer { flex: 1; }
    .nav-link {
      color: var(--text2);
      text-decoration: none;
      font-size: 0.9rem;
      padding: 6px 14px;
      border-radius: 6px;
      transition: all .15s;
    }
    .nav-link:hover { background: rgba(255,255,255,0.06); color: var(--text1); }
    .nav-link.active { color: var(--primary); }
    .nav-btn {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      text-decoration: none;
      padding: 7px 18px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity .15s;
    }
    .nav-btn:hover { opacity: .85; }

    /* ─── Hero ─── */
    .hero {
      max-width: 900px;
      margin: 0 auto;
      padding: 5rem 2rem 3rem;
      text-align: center;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(59,130,246,.1);
      border: 1px solid rgba(59,130,246,.2);
      border-radius: 50px;
      padding: 5px 16px;
      font-size: 0.82rem;
      color: #93c5fd;
      margin-bottom: 1.5rem;
      font-weight: 500;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #f1f5f9 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      color: var(--text2);
      font-size: 1.05rem;
      max-width: 560px;
      margin: 0 auto;
    }

    /* ─── Content ─── */
    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
    }

    /* ─── Filter Bar ─── */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .filter-btn {
      padding: 5px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }
    .filter-btn:hover { background: rgba(255,255,255,.06); color: var(--text1); }
    .filter-btn.active { border-color: var(--primary); background: rgba(59,130,246,.12); color: #93c5fd; }
    .filter-label { color: var(--text3); font-size: 0.82rem; align-self: center; margin-right: 4px; }

    /* ─── Timeline ─── */
    .timeline { display: flex; flex-direction: column; gap: 1.5rem; }

    .cl-entry {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem 1.75rem;
      display: flex;
      gap: 1.25rem;
      align-items: flex-start;
      transition: border-color .2s, transform .15s;
      animation: fadeIn .3s ease forwards;
      opacity: 0;
    }
    .cl-entry:hover { border-color: rgba(255,255,255,.14); transform: translateY(-1px); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .cl-icon {
      width: 44px; height: 44px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .cl-icon.feature     { background: rgba(59,130,246,.15); }
    .cl-icon.fix         { background: rgba(239,68,68,.13); }
    .cl-icon.improvement { background: rgba(16,185,129,.13); }
    .cl-icon.security    { background: rgba(245,158,11,.13); }
    .cl-icon.breaking    { background: rgba(236,72,153,.13); }

    .cl-body { flex: 1; min-width: 0; }
    .cl-head {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }
    .cl-version {
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--primary);
      background: rgba(59,130,246,.1);
      padding: 2px 9px;
      border-radius: 5px;
    }
    .cl-title { font-weight: 700; font-size: 1rem; color: var(--text1); }
    .cl-type-badge {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .cl-type-badge.feature     { background: rgba(59,130,246,.12); color: #93c5fd; }
    .cl-type-badge.fix         { background: rgba(239,68,68,.12); color: #fca5a5; }
    .cl-type-badge.improvement { background: rgba(16,185,129,.12); color: #6ee7b7; }
    .cl-type-badge.security    { background: rgba(245,158,11,.12); color: #fcd34d; }
    .cl-type-badge.breaking    { background: rgba(236,72,153,.12); color: #f9a8d4; }

    .cl-desc {
      color: var(--text2);
      font-size: 0.92rem;
      line-height: 1.65;
      margin-top: 0.4rem;
    }
    .cl-date {
      font-size: 0.78rem;
      color: var(--text3);
      margin-top: 0.6rem;
      font-family: 'Fira Code', monospace;
    }

    /* ─── States ─── */
    .loading-box, .empty-box {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text3);
    }
    .loading-box .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(59,130,246,.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-box .emoji { font-size: 3rem; margin-bottom: 1rem; }

    /* ─── Footer ─── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
      color: var(--text3);
      font-size: 0.85rem;
    }
    footer a { color: var(--text3); text-decoration: none; }
    footer a:hover { color: var(--text2); }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- ─── Nav ─── -->
<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="/">
      <div class="nav-logo-icon">⚡</div>
      RateLimit API
    </a>
    <div class="nav-spacer"></div>
    <a class="nav-link" href="/">Home</a>
    <a class="nav-link active" href="/changelog">Changelog</a>
    <a class="nav-link" href="/dashboard">Dashboard</a>
    <a class="nav-btn" href="/register">Kostenlos starten</a>
  </div>
</nav>

<!-- ─── Hero ─── -->
<div class="hero">
  <div class="hero-badge">📋 Release Notes</div>
  <h1>Changelog</h1>
  <p>Alle Änderungen, neuen Features und Bugfixes der RateLimit API chronologisch dokumentiert.</p>
</div>

<!-- ─── Content ─── -->
<div class="content">

  <!-- Filter bar -->
  <div class="filter-bar">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">Alle</button>
    <button class="filter-btn" data-filter="feature"     onclick="setFilter('feature', this)">✨ Features</button>
    <button class="filter-btn" data-filter="fix"         onclick="setFilter('fix', this)">🐛 Fixes</button>
    <button class="filter-btn" data-filter="improvement" onclick="setFilter('improvement', this)">⚡ Verbesserungen</button>
    <button class="filter-btn" data-filter="security"    onclick="setFilter('security', this)">🔒 Security</button>
    <button class="filter-btn" data-filter="breaking"    onclick="setFilter('breaking', this)">💥 Breaking</button>
  </div>

  <!-- Timeline -->
  <div id="timeline" class="timeline">
    <div class="loading-box">
      <div class="spinner"></div>
      <div>Changelog wird geladen…</div>
    </div>
  </div>

</div>

<footer>
  <div style="margin-bottom:1rem">
    <a href="/">Home</a> &nbsp;·&nbsp;
    <a href="/dashboard">Dashboard</a> &nbsp;·&nbsp;
    <a href="/impressum">Impressum</a> &nbsp;·&nbsp;
    <a href="/datenschutz">Datenschutz</a>
  </div>
  © 2026 RateLimit API
</footer>

<script>
  const HQ_API = 'https://webcontrol-hq-api.karol-paschek.workers.dev';
  const SITE_ID = 'ratelimit';

  const TYPE_ICON  = { feature:'✨', fix:'🐛', improvement:'⚡', security:'🔒', breaking:'💥' };
  const TYPE_LABEL = { feature:'Feature', fix:'Fix', improvement:'Improvement', security:'Security', breaking:'Breaking Change' };

  let allEntries = [];
  let activeFilter = 'all';

  async function loadChangelog() {
    try {
      const res = await fetch(`${HQ_API}/api/changelog/published?site_id=${SITE_ID}`);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      allEntries = await res.json();
      render();
    } catch (e) {
      console.error(e);
      document.getElementById('timeline').innerHTML = `
        <div class="empty-box">
          <div class="emoji">⚠️</div>
          <div>Changelog konnte nicht geladen werden.</div>
          <div style="margin-top:8px;font-size:0.82rem">Bitte später erneut versuchen.</div>
        </div>`;
    }
  }

  function setFilter(type, btn) {
    activeFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function fmtDate(iso) {
    if (!iso) return '–';
    const d = new Date(iso);
    return d.toLocaleDateString('de-DE', { year:'numeric', month:'long', day:'numeric' });
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function render() {
    const tl = document.getElementById('timeline');
    const filtered = activeFilter === 'all'
      ? allEntries
      : allEntries.filter(e => e.type === activeFilter);

    if (!filtered.length) {
      tl.innerHTML = `
        <div class="empty-box">
          <div class="emoji">🔍</div>
          <div>Keine Einträge für diesen Filter.</div>
        </div>`;
      return;
    }

    tl.innerHTML = filtered.map((e, i) => `
      <div class="cl-entry" style="animation-delay:${i * 40}ms">
        <div class="cl-icon ${e.type || 'feature'}">${TYPE_ICON[e.type] || '📋'}</div>
        <div class="cl-body">
          <div class="cl-head">
            <span class="cl-version">${esc(e.version)}</span>
            <span class="cl-title">${esc(e.title)}</span>
            <span class="cl-type-badge ${e.type || 'feature'}">${TYPE_LABEL[e.type] || e.type}</span>
          </div>
          ${e.description ? `<div class="cl-desc">${esc(e.description).replace(/\n/g,'<br>')}</div>` : ''}
          <div class="cl-date">${fmtDate(e.created_at)}</div>
        </div>
      </div>
    `).join('');
  }

  loadChangelog();
</script>
</body>
</html>
