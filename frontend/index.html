    <!-- Structured Data – FAQ (für Google Rich Results) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Was ist API Rate Limiting?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "API Rate Limiting begrenzt die Anzahl von Anfragen an eine API pro Zeiteinheit. Ohne Rate Limiting kann jeder Client beliebig viele Anfragen senden, was zu Überlastung, Sicherheitsproblemen und explodierende Kosten führt. Rate Limiting setzt eine Obergrenze (z.B. 100 req/min) und antwortet bei Überschreitung mit HTTP 429."
          }
        },
        {
          "@type": "Question",
          "name": "Wie integriere ich RateLimit API in meine Anwendung?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Die Integration dauert ca. 5 Minuten: API Key erstellen, im Dashboard das Rate Limit konfigurieren, dann einen HTTP-Check-Request vor jeder API-Anfrage senden und das 'allowed'-Feld auswerten. Kein SDK, keine Library nötig."
          }
        },
        {
          "@type": "Question",
          "name": "Welchen Rate-Limiting-Algorithmus verwendet RateLimit API?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "RateLimit API verwendet den Token-Bucket-Algorithmus. Dieser erlaubt kurze natürliche Bursts ohne das Gesamtlimit zu überschreiten. Jeder API-Key hat einen Eimer mit Tokens, der sich kontinuierlich auffüllt."
          }
        },
        {
          "@type": "Question",
          "name": "Ist RateLimit API DSGVO-konform?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja. Die Hauptdatenbank liegt in der EU-Region auf Cloudflare D1. Request-Logs enthalten nur IP-Adresse, Endpoint, Timestamp und Blocked-Flag – keine personenbezogenen Daten der Endnutzer."
          }
        },
        {
          "@type": "Question",
          "name": "Was ist der Unterschied zwischen RateLimit API und Upstash?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Upstash Rate Limiting ist eine Low-Level-Library für eigene Cloudflare Workers. RateLimit API ist ein fertiger Managed Service mit Dashboard, IP-Filtern, Analytics, SDKs für JS/Python/Go und Middleware für Express/Next.js – ohne eigenen Code."
          }
        },
        {
          "@type": "Question",
          "name": "Gibt es ein SDK für RateLimit API?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja. Es gibt offizielle SDKs für JavaScript/TypeScript (npm install @ratelimit-api/sdk), Python (pip install ratelimit-api) und Go. Zusätzlich gibt es fertige Middleware für Express, Next.js und Cloudflare Workers zum direkten Copy-Paste."
          }
        },
        {
          "@type": "Question",
          "name": "Was ist IP Reputation Scoring?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Der IP Reputation Score (0-100) bewertet jede IP automatisch basierend auf Blockierrate, Anfragevolumen, bekannten Bot-User-Agents und Auto-Block-Status. IPs mit Score ≥70 gelten als hohes Risiko und können automatisch gesperrt werden."
          }
        },
        {
          "@type": "Question",
          "name": "Was ist die What-if Simulation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Die What-if Simulation repliziert den echten Traffic der letzten 7 Tage gegen ein hypothetisches Limit und zeigt genau, wie viele Requests mehr oder weniger blockiert worden wären. So kannst du Limit-Änderungen gefahrlos testen bevor du sie live stellst."
          }
        }
      ]
    }
